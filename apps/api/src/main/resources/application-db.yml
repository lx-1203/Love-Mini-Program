spring:
  profiles:
    include: real
  datasource:
    # 数据库连接配置：通过 DB_URL / DB_USERNAME / DB_PASSWORD 环境变量外部化。
    # 启动时由 DatabaseConfigValidator 校验非空，未配置将拒绝启动。
    # 本地开发可通过 .env 文件或 start-server 脚本配置。
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/qihang_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: true
    # 默认扫描两个位置：
    #   1. filesystem:../../database/flyway/sql —— 既有迁移脚本目录（与项目早期保持一致）
    #   2. classpath:db/migration —— Spring Boot 默认迁移目录，用于 Phase A 起新增的迁移
    # 可通过环境变量 APP_FLYWAY_LOCATIONS 覆盖（如需禁用某个位置）。
    locations: ${APP_FLYWAY_LOCATIONS:filesystem:../../database/flyway/sql,classpath:db/migration}
    baseline-on-migrate: false
    # 使用双下划线占位符，避免与 MySQL 单行注释 # 以及 Spring ${...} 冲突。
    # 用于 V2026.06.25.0001__add_user_role_and_init_admin.sql 初始化管理员账号。
    placeholders:
      admin_openid: ${ADMIN_OPENID:admin-default-openid-change-me}
      admin_nickname: ${ADMIN_NICKNAME:系统管理员}
      # 管理员密码 BCrypt 哈希，默认明文为 'Admin@2026'。
      # ⚠️ 默认哈希为示例值（对应明文 'password'），仅用于开发/测试。
      # 生产环境必须通过环境变量 ADMIN_PASSWORD_HASH 配置 'Admin@2026' 的 BCrypt 哈希。
      # 生成方法：调用 PasswordEncoderConfig.encodePassword("Admin@2026")
      # 首次登录后必须立即修改密码。
      admin_password_hash: ${ADMIN_PASSWORD_HASH:.20cQQubK3.HZWzG3YB1tlRy.fqvM/BG}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect