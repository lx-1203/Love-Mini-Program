spring:
  application:
    name: campus-love-api
  profiles:
    default: mock
  # Multipart 文件上传配置：允许上传最大 50MB 的单文件、50MB 的整体请求
  # 与媒体上传校验逻辑（视频 ≤50MB）保持一致
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
server:
  port: ${APP_PORT:8080}

app:
  # 媒体存储配置（Phase A - Task A3）
  # storageRoot: 本地存储根目录，相对路径基于应用工作目录
  # URL 访问路径前缀 /uploads/** 由 WebConfig 静态资源映射
  media:
    storage-root: ${APP_MEDIA_STORAGE_ROOT:./uploads}
  jwt:
    # JWT 签名密钥：必须通过环境变量 JWT_SECRET 设置，不允许使用默认值。
    # 启动时若未设置或使用了不安全的默认值，应用将拒绝启动。
    # 生成安全密钥示例：openssl rand -base64 48
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
  recommendation:
    daily-limit: 10
    discussion-limit: 10
    candidate-page-size: 200
    campus-weight: 50
    city-weight: 20
    interest-weight: 10
    schedule-weight: 15
  match:
    heart-signal-expire-hours: 48
    candidate-page-size: 50
    default-chat-duration: 20
    campus-weight: 50
    city-weight: 20
    interest-weight: 10
    schedule-weight: 15
  chat:
    session-expire-hours: 24
  checkin:
    extra-quota-per-check-in: 3
  content-filter:
    enabled: true
    keywords:
      - 赌博
      - 色情
      - 违法
      - 毒品
      - 枪支
      - 暴力
      - 诈骗
      - 传销
      - 裸聊
      - 约炮
      - 嫖娼
      - 卖淫
      - 赌博网站
      - 六合彩
      - 博彩
