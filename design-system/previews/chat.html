    :root {

      --brand-600: #25A86D; --brand-700: #1E8C5A;
      --pink-50: #FDF2F8; --pink-400: #F472B6; --pink-500: #EC4899;
      --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0;
      --gray-300: #CBD5E1; --gray-400: #94A3B8; --gray-500: #64748B;
      --gray-600: #475569; --gray-700: #334155; --gray-800: #1E293B;
      --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --radius-full: 9999px;

      --text-h3: 18px; --text-body: 16px; --text-body-sm: 14px;

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--gray-50); color: var(--gray-800);

    .status-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-4); font-size: var(--text-caption); color: var(--gray-700); }
    .status-bar .time { font-weight: 600; }
    .status-bar .icons { display: flex; gap: 4px; align-items: center; }
    .status-bar .icons svg { width: 16px; height: 16px; }
    .nav-bar { height: 48px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-4); border-bottom: 1px solid var(--gray-200); }
    .nav-bar h1 { font-size: var(--text-h3); font-weight: 600; }
    .nav-bar .right { display: flex; gap: var(--space-3); }
    .nav-bar .icon-btn { width: 36px; height: 36px; border-radius: var(--radius-full); background: var(--gray-50); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
    .nav-bar .icon-btn svg { width: 20px; height: 20px; color: var(--gray-600); }
    .page-content { padding-bottom: 80px; }
    /* 鎼滅储鏍?*/
    .search-bar { padding: var(--space-3) var(--space-4); }
    .search-input { width: 100%; height: 40px; background: var(--gray-100); border: none; border-radius: var(--radius-full); padding: 0 var(--space-4) 0 40px; font-size: var(--text-body-sm); color: var(--gray-800); outline: none; }
    .search-input::placeholder { color: var(--gray-400); }
    .search-wrapper { position: relative; }
    .search-wrapper svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--gray-400); }
    /* 璇濋鎺ㄨ崘 */
    .topic-bar { padding: 0 var(--space-4) var(--space-3); display: flex; gap: var(--space-2); overflow-x: auto; scrollbar-width: none; }
    .topic-bar::-webkit-scrollbar { display: none; }
    .topic-chip { flex: 0 0 auto; background: var(--brand-50); color: var(--brand-600); font-size: var(--text-caption); font-weight: 500; padding: 6px 14px; border-radius: var(--radius-full); border: none; cursor: pointer; white-space: nowrap; }
    /* 浼氳瘽鍒楄〃 */
    .conversation-list { padding: 0 var(--space-4); }
    .conversation-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) 0; border-bottom: 1px solid var(--gray-100); cursor: pointer; }
    .conversation-item:active { background: var(--gray-50); margin: 0 calc(var(--space-4) * -1); padding: var(--space-3) var(--space-4); }
    .conversation-item:last-child { border-bottom: none; }
    .conversation-item .avatar-wrap { position: relative; flex-shrink: 0; }
    .conversation-item .avatar { width: 52px; height: 52px; border-radius: var(--radius-full); object-fit: cover; }
    .conversation-item .avatar .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: var(--success); border: 2px solid #fff; border-radius: 50%; }
    .conversation-item .content { flex: 1; min-width: 0; }
    .conversation-item .content .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .conversation-item .content .name { font-size: var(--text-body-sm); font-weight: 600; color: var(--gray-800); }
    .conversation-item .content .time { font-size: var(--text-caption); color: var(--gray-400); }
    .conversation-item .content .bottom-row { display: flex; justify-content: space-between; align-items: center; }
    .conversation-item .content .message { font-size: var(--text-caption); color: var(--gray-500); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .conversation-item .content .badge { min-width: 18px; height: 18px; background: var(--pink-400); color: #fff; font-size: 10px; font-weight: 600; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; padding: 0 5px; }
    .conversation-item .official-tag { font-size: 10px; color: var(--brand-500); background: var(--brand-50); padding: 1px 6px; border-radius: var(--radius-full); margin-left: 4px; }
    /* 鍒嗛殧鏍囬 */
    .list-header { padding: var(--space-4) 0 var(--space-2); font-size: var(--text-caption); color: var(--gray-400); font-weight: 500; }
    /* 鍖归厤鎴愬姛鎻愮ず */

    .match-card { background: linear-gradient(135deg, var(--brand-50), var(--pink-50)); border-radius: var(--radius-md); padding: var(--space-4); display: flex; align-items: center; gap: var(--space-3); }
    .match-card .icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--pink-400), var(--pink-500)); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .match-card .icon svg { width: 24px; height: 24px; color: #fff; }
    .match-card .info { flex: 1; }
    .match-card .info .title { font-size: var(--text-body-sm); font-weight: 600; color: var(--gray-800); margin-bottom: 2px; }
    .match-card .info .desc { font-size: var(--text-caption); color: var(--gray-500); }
    .match-card .action { font-size: var(--text-caption); color: var(--pink-500); font-weight: 600; }
    /* 搴曢儴 TabBar */
    .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; height: 56px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gray-200); padding-bottom: env(safe-area-inset-bottom); }
    .tab-bar .tab { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 12px; position: relative; }
    .tab-bar .tab svg { width: 24px; height: 24px; color: var(--gray-400); transition: color 0.2s; }
    .tab-bar .tab span { font-size: 10px; color: var(--gray-400); transition: color 0.2s; }
    .tab-bar .tab.active svg { color: var(--brand-400); transform: scale(1.1); }
    .tab-bar .tab.active span { color: var(--brand-400); font-weight: 600; }
    .tab-bar .tab .tab-badge { position: absolute; top: 0; right: 4px; min-width: 16px; height: 16px; background: var(--pink-400); color: #fff; font-size: 9px; font-weight: 600; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; padding: 0 4px; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInUp 0.3s ease-out forwards; }
