    * { margin: 0; padding: 0; box-sizing: border-box; }

    .status-bar .icons { display: flex; gap: 4px; align-items: center; }
    .status-bar .icons svg { width: 16px; height: 16px; }

    .profile-name { font-size: 22px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }

    .completion-item .check.pending { background: var(--gray-200); color: var(--gray-400); }

    .menu-card { background: #fff; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
    .menu-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4); border-bottom: 1px solid var(--gray-100); cursor: pointer; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
