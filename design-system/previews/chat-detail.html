<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鑱婂ぉ璇︽儏 鈥?鏍″洯鎭嬬埍灏忕▼搴?/title>
  <style>
    :root {
      --brand-50: #F0FDF4; --brand-100: #D1FAE5; --brand-200: #A7F3D0;
      --brand-300: #6EE7B7; --brand-400: #3FCF8E; --brand-500: #2DB97A;
      --brand-600: #25A86D; --brand-700: #1E8C5A;
      --pink-50: #FDF2F8; --pink-100: #FCE7F3; --pink-400: #F472B6;
      --pink-500: #EC4899; --pink-600: #DB2777;
      --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0;
      --gray-300: #CBD5E1; --gray-400: #94A3B8; --gray-500: #64748B;
      --gray-600: #475569; --gray-700: #334155; --gray-800: #1E293B;
      --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --text-h3: 18px; --text-body: 16px; --text-body-sm: 14px;
      --text-caption: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--gray-50); color: var(--gray-800);
      width: 375px; min-height: 100vh; margin: 0 auto;
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    .status-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-4); font-size: var(--text-caption); color: var(--gray-700); }
    .status-bar .time { font-weight: 600; }
    .status-bar .icons { display: flex; gap: 4px; align-items: center; }
    .status-bar .icons svg { width: 16px; height: 16px; }
    .chat-header { height: 48px; background: #fff; display: flex; align-items: center; padding: 0 var(--space-4); border-bottom: 1px solid var(--gray-200); gap: var(--space-3); }
    .chat-header .back { width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; }
    .chat-header .back svg { width: 20px; height: 20px; color: var(--gray-600); }
    .chat-header .user-info { flex: 1; display: flex; align-items: center; gap: var(--space-2); }
    .chat-header .avatar { width: 36px; height: 36px; border-radius: var(--radius-full); object-fit: cover; }
    .chat-header .name { font-size: var(--text-body-sm); font-weight: 600; color: var(--gray-800); }
    .chat-header .status { font-size: var(--text-caption); color: var(--success); }
    .chat-header .more { width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; }
    .chat-header .more svg { width: 20px; height: 20px; color: var(--gray-600); }
    /* 鑱婂ぉ鍐呭鍖?*/
    .chat-content { flex: 1; padding: var(--space-4); overflow-y: auto; padding-bottom: 100px; }
    /* 鏃堕棿鎴?*/
    .time-divider { text-align: center; margin: var(--space-4) 0; }
    .time-divider span { font-size: var(--text-caption); color: var(--gray-400); background: var(--gray-100); padding: 4px 12px; border-radius: var(--radius-full); }
    /* 娑堟伅姘旀场 */
    .message-row { display: flex; margin-bottom: var(--space-3); gap: var(--space-2); }
    .message-row.sent { flex-direction: row-reverse; }
    .message-row .avatar { width: 36px; height: 36px; border-radius: var(--radius-full); object-fit: cover; flex-shrink: 0; }
    .message-row .bubble { max-width: 240px; padding: var(--space-3); border-radius: var(--radius-lg); font-size: var(--text-body-sm); line-height: 1.5; position: relative; }
    .message-row.received .bubble { background: #fff; color: var(--gray-800); border-bottom-left-radius: 4px; box-shadow: var(--shadow-sm); }
    .message-row.sent .bubble { background: var(--brand-400); color: #fff; border-bottom-right-radius: 4px; }
    .message-row .bubble .time { font-size: 10px; color: var(--gray-400); margin-top: 4px; }
    .message-row.sent .bubble .time { color: rgba(255,255,255,0.7); }
    /* 鐮村啺寤鸿 */
    .icebreaker-section { padding: var(--space-3) 0; }
    .icebreaker-label { font-size: var(--text-caption); color: var(--gray-400); text-align: center; margin-bottom: var(--space-2); }
    .icebreaker-list { display: flex; flex-wrap: wrap; gap: var(--space-2); justify-content: center; }
    .icebreaker-chip { background: #fff; border: 1px solid var(--brand-200); color: var(--brand-600); font-size: var(--text-caption); padding: 6px 14px; border-radius: var(--radius-full); cursor: pointer; }
    .icebreaker-chip:active { background: var(--brand-50); }
    /* 蹇冨姩淇″彿 */
    .heart-signal { display: flex; align-items: center; justify-content: center; gap: var(--space-2); margin: var(--space-3) 0; font-size: var(--text-caption); color: var(--pink-500); }
    .heart-signal svg { width: 16px; height: 16px; }
    /* 杈撳叆鍖哄煙 */
    .chat-input-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; background: #fff; border-top: 1px solid var(--gray-200); padding: var(--space-3) var(--space-4); padding-bottom: calc(var(--space-3) + env(safe-area-inset-bottom)); display: flex; align-items: center; gap: var(--space-2); }
    .chat-input-bar .voice-btn { width: 36px; height: 36px; border-radius: var(--radius-full); background: var(--gray-100); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
    .chat-input-bar .voice-btn svg { width: 20px; height: 20px; color: var(--gray-500); }
    .chat-input-bar .input-wrap { flex: 1; height: 40px; background: var(--gray-100); border-radius: var(--radius-full); padding: 0 var(--space-4); display: flex; align-items: center; }
    .chat-input-bar .input-wrap input { width: 100%; border: none; background: none; font-size: var(--text-body-sm); color: var(--gray-800); outline: none; }
    .chat-input-bar .input-wrap input::placeholder { color: var(--gray-400); }
    .chat-input-bar .emoji-btn { width: 36px; height: 36px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; }
    .chat-input-bar .emoji-btn svg { width: 22px; height: 22px; color: var(--gray-500); }
    .chat-input-bar .send-btn { width: 40px; height: 40px; border-radius: var(--radius-full); background: var(--brand-400); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
    .chat-input-bar .send-btn svg { width: 20px; height: 20px; color: #fff; }
    .chat-input-bar .send-btn:active { transform: scale(0.9); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInUp 0.3s ease-out forwards; }
  </style>
</head>
