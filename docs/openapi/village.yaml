openapi: 3.0.3
info:
  title: Campus Love - Village Community API
  version: 1.0.0
servers:
  - url: /api
paths:
  # ========== 帖子 ==========
  /posts:
    get:
      summary: Get post list
      operationId: getPosts
      parameters:
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: [all, dating, study, life, activity, help]
            default: all
          description: Post category filter
        - in: query
          name: tag
          required: false
          schema:
            type: string
          description: Tag filter
        - in: query
          name: sortBy
          required: false
          schema:
            type: string
            enum: [latest, hottest, recommended]
            default: latest
          description: Sort order
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Publish a post
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /posts/{id}:
    get:
      summary: Get post detail
      operationId: getPostDetail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Post ID
      responses:
        '200':
          description: Post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /posts/{id}/like:
    post:
      summary: Like a post
      operationId: likePost
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Post ID
      responses:
        '200':
          description: Post liked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostLikeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /posts/{id}/share:
    post:
      summary: Share a post
      operationId: sharePost
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Post ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SharePostRequest'
      responses:
        '200':
          description: Post shared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /posts/{id}/comments:
    get:
      summary: Get comment list for a post
      operationId: getPostComments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Post ID
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Publish a comment
      operationId: createComment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Post ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '200':
          description: Comment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ========== 兴趣圈 ==========
  /circles:
    get:
      summary: Get interest circle list
      operationId: getCircles
      responses:
        '200':
          description: List of interest circles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CircleView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /circles/{id}/join:
    post:
      summary: Join or leave a circle (toggle)
      operationId: toggleCircleJoin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Circle ID
      responses:
        '200':
          description: Toggle result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircleMembershipView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /circles/{id}/topics:
    get:
      summary: Get topics in a circle
      operationId: getCircleTopics
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Circle ID
      responses:
        '200':
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CircleTopicView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Publish a topic in a circle
      operationId: createCircleTopic
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Circle ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircleTopicRequest'
      responses:
        '200':
          description: Topic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircleTopicView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /circles/topics/{id}/replies:
    get:
      summary: Get replies for a circle topic
      operationId: getCircleReplies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Topic ID
      responses:
        '200':
          description: List of replies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CircleReplyView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Reply to a circle topic
      operationId: createCircleReply
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Topic ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircleReplyRequest'
      responses:
        '200':
          description: Reply created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircleReplyView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    # ===== 帖子相关 Schema =====
    PostAuthor:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        avatarUrl:
          type: string
          nullable: true
        campusName:
          type: string
      required:
        - userId
        - nickname
        - campusName
    PostSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        author:
          $ref: '#/components/schemas/PostAuthor'
        category:
          type: string
          enum: [dating, study, life, activity, help]
        tags:
          type: array
          items:
            type: string
        likeCount:
          type: integer
          minimum: 0
        commentCount:
          type: integer
          minimum: 0
        shareCount:
          type: integer
          minimum: 0
          description: Number of shares
        viewCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        isHot:
          type: boolean
      required:
        - id
        - title
        - summary
        - author
        - category
        - tags
        - likeCount
        - commentCount
        - shareCount
        - viewCount
        - createdAt
        - isHot
    PostDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        author:
          $ref: '#/components/schemas/PostAuthor'
        category:
          type: string
          enum: [dating, study, life, activity, help]
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
        likeCount:
          type: integer
          minimum: 0
        commentCount:
          type: integer
          minimum: 0
        shareCount:
          type: integer
          minimum: 0
          description: Number of shares
        viewCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isLiked:
          type: boolean
        isAuthor:
          type: boolean
      required:
        - id
        - title
        - content
        - author
        - category
        - tags
        - images
        - likeCount
        - commentCount
        - shareCount
        - viewCount
        - createdAt
        - updatedAt
        - isLiked
        - isAuthor
    CreatePostRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
          maxLength: 5000
        category:
          type: string
          enum: [dating, study, life, activity, help]
        tags:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 10
        images:
          type: array
          items:
            type: string
          maxItems: 9
      required:
        - title
        - content
        - category
    PostListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PostSummary'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
      required:
        - items
        - total
        - page
        - pageSize
    PostLikeResponse:
      type: object
      properties:
        success:
          type: boolean
        liked:
          type: boolean
        likeCount:
          type: integer
          minimum: 0
      required:
        - success
        - liked
        - likeCount
    CommentAuthor:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        avatarUrl:
          type: string
          nullable: true
      required:
        - userId
        - nickname
    CommentItem:
      type: object
      properties:
        id:
          type: string
        postId:
          type: string
        parentId:
          type: string
          nullable: true
        author:
          $ref: '#/components/schemas/CommentAuthor'
        content:
          type: string
        likeCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        isAuthor:
          type: boolean
        replyTo:
          type: string
          nullable: true
          description: Nickname of the user being replied to
      required:
        - id
        - postId
        - author
        - content
        - likeCount
        - createdAt
        - isAuthor
    CreateCommentRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 1000
        parentId:
          type: string
          nullable: true
          description: Parent comment ID for nested replies
      required:
        - content
    CommentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommentItem'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
      required:
        - items
        - total
        - page
        - pageSize

    # ===== 转发相关 Schema =====
    SharePostRequest:
      type: object
      properties:
        comment:
          type: string
          maxLength: 500
          description: Optional comment when sharing
    ShareResponse:
      type: object
      properties:
        id:
          type: string
          description: Share record ID
        postId:
          type: string
          description: Shared post ID
        shareCount:
          type: integer
          minimum: 0
          description: Total shares for this post after the operation
      required:
        - id
        - postId
        - shareCount

    # ===== 兴趣圈相关 Schema =====
    CircleView:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: Circle name
        icon:
          type: string
          description: Emoji icon
        description:
          type: string
          description: Circle description
        memberCount:
          type: integer
          minimum: 0
          description: Member count
        isJoined:
          type: boolean
          description: Whether current user has joined
        latestTopicSummary:
          type: string
          nullable: true
          description: Latest topic title (truncated)
      required:
        - id
        - name
        - icon
        - description
        - memberCount
        - isJoined
    CircleMembershipView:
      type: object
      properties:
        circleId:
          type: integer
          format: int64
        joined:
          type: boolean
        memberCount:
          type: integer
          minimum: 0
      required:
        - circleId
        - joined
        - memberCount
    CircleAuthorView:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
      required:
        - userId
        - nickname
    CircleTopicView:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
          description: Truncated content summary
        imageCount:
          type: integer
          minimum: 0
        replyCount:
          type: integer
          minimum: 0
        author:
          $ref: '#/components/schemas/CircleAuthorView'
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - imageCount
        - replyCount
        - author
        - createdAt
    CircleTopicRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
          maxLength: 5000
        images:
          type: array
          items:
            type: string
          maxItems: 9
      required:
        - title
        - content
    CircleReplyView:
      type: object
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string
        author:
          $ref: '#/components/schemas/CircleAuthorView'
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - author
        - createdAt
    CircleReplyRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 1000
      required:
        - content

    # ===== 通用 =====
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'