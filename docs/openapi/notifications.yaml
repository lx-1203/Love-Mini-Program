openapi: 3.0.3
info:
  title: Campus Love - Notifications API
  version: 1.0.0
servers:
  - url: /api
paths:
  /notifications:
    get:
      summary: Get notification list for current user
      operationId: getNotifications
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /notifications/{id}/read:
    put:
      summary: Mark a notification as read
      operationId: markNotificationRead
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Notification ID
      responses:
        '200':
          description: Notification marked as read
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /notifications/unread-count:
    get:
      summary: Get unread notification count
      operationId: getUnreadNotificationCount
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    NotificationSourceUser:
      type: object
      properties:
        displayName:
          type: string
        avatar:
          type: string
          description: Avatar URL
      required:
        - displayName
        - avatar
    NotificationView:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [follow, like, comment, visitor, match]
          description: Notification type
        sourceUser:
          $ref: '#/components/schemas/NotificationSourceUser'
        referenceId:
          type: integer
          format: int64
          nullable: true
          description: Associated entity ID (post/comment/user)
        referenceType:
          type: string
          enum: [post, comment, user]
          nullable: true
          description: Associated entity type
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
        summary:
          type: string
          description: Human-readable notification summary (e.g., "xxx关注了你")
      required:
        - id
        - type
        - sourceUser
        - isRead
        - createdAt
        - summary
    UnreadCountView:
      type: object
      properties:
        count:
          type: integer
          format: int64
          minimum: 0
      required:
        - count
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'