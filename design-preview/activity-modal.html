<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>活动弹层 — 校园恋爱小程序</title>
<style>
:root {
  --brand: #3FCF8E;
  --brand-dark: #2DB97A;
  --brand-light: #D1F0E0;
  --brand-50: #E8F8F0;
  --gray-50: #F4F6FA;
  --gray-100: #EEF0F4;
  --gray-200: #E2E8F0;
  --gray-400: #94A3B8;
  --gray-500: #64748B;
  --gray-700: #334155;
  --gray-800: #1F2329;
  --gray-900: #0E1116;
  --text-primary: #1F2329;
  --text-secondary: #5B6470;
  --text-tertiary: #9AA1AB;
  --price: #E5454D;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--gray-900);
  width: 375px;
  min-height: 100vh;
  margin: 0 auto;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
.phone-frame {
  width: 375px;
  height: 812px;
  position: relative;
  overflow: hidden;
  background: var(--gray-50);
}
.status-bar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--gray-0);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}
.status-bar .icons { display: flex; gap: 4px; align-items: center; }
.status-bar .icons svg { width: 16px; height: 16px; stroke: var(--text-primary); fill: none; stroke-width: 1.5; }

/* 遮罩层 */
.modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

/* 弹层卡片 */
.modal-card {
  width: 311px;
  background: var(--gray-0);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(15,23,42,.18);
}
.modal-card .cover {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3d 50%, #1a3a2a 100%);
  position: relative;
}
.modal-card .cover .close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 24px;
  height: 24px;
  background: rgba(0, 0, 0, 0.4);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-card .content {
  padding: 20px;
}
.modal-card .content .label {
  font-size: 14px;
  font-weight: 600;
  color: var(--brand);
  margin-bottom: 8px;
}
.modal-card .content .title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
}
.modal-card .content .meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.modal-card .content .meta .item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.modal-card .content .meta .item svg {
  width: 16px;
  height: 16px;
  stroke: var(--text-tertiary);
  fill: none;
  stroke-width: 1.5;
}
.modal-card .content .price-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.modal-card .content .price {
  font-size: 20px;
  font-weight: 700;
  color: var(--price);
}
.modal-card .content .btn-join {
  padding: 10px 24px;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.modal-card .content .btn-join.dark {
  background: var(--brand-dark);
}

/* 圆点指示器 */
.modal-indicator {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
}
.modal-indicator .dot {
  width: 8px;
  height: 8px;
  background: var(--gray-200);
  border-radius: 50%;
}
.modal-indicator .dot.active {
  width: 16px;
  border-radius: 4px;
  background: var(--brand);
}

/* 背景页面 */
.background-page {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--gray-50);
  opacity: 0.3;
}
</style>
</head>
<body>

<div class="phone-frame">
  <!-- 状态栏 -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      <svg viewBox="0 0 24 24"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
    </div>
  </div>

  <!-- 遮罩层 -->
  <div class="modal-overlay">
    <div class="modal-card">
      <div class="cover">
        <button class="close-btn">×</button>
      </div>
      <div class="content">
        <div class="label">最近活动</div>
        <div class="title">校园十佳歌手决赛</div>
        <div class="meta">
          <div class="item">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            5月20日 周二 19:00
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            大学城校区大礼堂
          </div>
          <div class="item">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            326人已报名
          </div>
        </div>
        <div class="price-row">
          <span class="price">¥18 起</span>
          <button class="btn-join">去看看</button>
        </div>
        <div class="modal-indicator">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
