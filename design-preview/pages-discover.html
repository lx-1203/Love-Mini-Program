<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>逛逛页 — 校园恋爱小程序</title>
<style>
:root {
  --brand: #3FCF8E;
  --brand-dark: #2DB97A;
  --brand-light: #D1F0E0;
  --brand-50: #E8F8F0;
  --gray-0: #FFFFFF;
  --gray-50: #F4F6FA;
  --gray-100: #EEF0F4;
  --gray-200: #E2E8F0;
  --gray-400: #94A3B8;
  --gray-500: #64748B;
  --gray-700: #334155;
  --gray-800: #1F2329;
  --text-primary: #1F2329;
  --text-secondary: #5B6470;
  --text-tertiary: #9AA1AB;
  --price: #E5454D;
  --orange: #FF7A45;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--gray-50);
  width: 375px;
  min-height: 100vh;
  margin: 0 auto;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.phone-frame {
  width: 375px;
  min-height: 812px;
  position: relative;
  background: var(--gray-50);
}
.status-bar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--gray-0);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}
.status-bar .icons { display: flex; gap: 4px; align-items: center; }
.status-bar .icons svg { width: 16px; height: 16px; stroke: var(--text-primary); fill: none; stroke-width: 1.5; }

/* 搜索栏 */
.search-bar {
  padding: 12px 16px;
  background: var(--gray-0);
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-bar .search-box {
  flex: 1;
  height: 36px;
  background: var(--gray-50);
  border: 1px solid var(--gray-100);
  border-radius: 12px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-bar .search-box svg { width: 16px; height: 16px; stroke: var(--text-tertiary); fill: none; stroke-width: 1.5; }
.search-bar .search-box input {
  flex: 1;
  border: none;
  background: none;
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
}
.search-bar .search-box input::placeholder { color: var(--text-tertiary); }

/* 分类胶囊 */
.category-tabs {
  padding: 12px 16px;
  background: var(--gray-0);
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.category-tabs::-webkit-scrollbar { display: none; }
.category-tab {
  padding: 6px 16px;
  background: var(--gray-50);
  border: 1px solid var(--gray-100);
  border-radius: 16px;
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  cursor: pointer;
}
.category-tab.active {
  background: var(--brand-50);
  color: var(--brand);
  border-color: var(--brand-light);
}

/* 精选推荐 */
.section {
  margin: 12px 16px;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.section-header h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}
.section-header .more {
  font-size: 14px;
  color: var(--text-tertiary);
}
.product-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.product-scroll::-webkit-scrollbar { display: none; }
.product-card {
  flex: 0 0 200px;
  background: var(--gray-0);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.04);
}
.product-card .thumb {
  width: 100%;
  height: 120px;
  background: var(--gray-100);
  position: relative;
}
.product-card .thumb .badge {
  position: absolute;
  top: 8px;
  left: 8px;
  padding: 2px 8px;
  background: var(--orange);
  color: #fff;
  font-size: 10px;
  font-weight: 500;
  border-radius: 4px;
}
.product-card .info {
  padding: 12px;
}
.product-card .info .title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.product-card .info .meta {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}
.product-card .info .price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.product-card .info .price {
  font-size: 18px;
  font-weight: 700;
  color: var(--price);
}
.product-card .info .sales {
  font-size: 11px;
  color: var(--text-tertiary);
}

/* TabBar */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 375px;
  height: 49px;
  background: var(--gray-0);
  border-top: 1px solid var(--gray-100);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
}
.tab-item svg {
  width: 24px;
  height: 24px;
  stroke: var(--text-tertiary);
  fill: none;
  stroke-width: 1.5;
}
.tab-item span {
  font-size: 10px;
  color: var(--text-tertiary);
}
.tab-item.active svg {
  stroke: var(--brand);
  fill: var(--brand);
}
.tab-item.active span {
  color: var(--brand);
  font-weight: 500;
}
</style>
</head>
<body>

<div class="phone-frame">
  <!-- 状态栏 -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      <svg viewBox="0 0 24 24"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
    </div>
  </div>

  <!-- 搜索栏 -->
  <div class="search-bar">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="搜索商品、活动...">
    </div>
  </div>

  <!-- 分类胶囊 -->
  <div class="category-tabs">
    <span class="category-tab active">全部</span>
    <span class="category-tab">活动票</span>
    <span class="category-tab">餐饮</span>
    <span class="category-tab">周边</span>
    <span class="category-tab">文创</span>
  </div>

  <!-- 精选推荐 -->
  <div class="section">
    <div class="section-header">
      <h3>精选推荐</h3>
      <span class="more">更多 ></span>
    </div>
    <div class="product-scroll">
      <div class="product-card">
        <div class="thumb">
          <span class="badge">校内</span>
        </div>
        <div class="info">
          <div class="title">二手教材《高等数学》</div>
          <div class="meta">5月18日 · 教材教辅</div>
          <div class="price-row">
            <span class="price">¥9.9</span>
            <span class="sales">已售 324</span>
          </div>
        </div>
      </div>
      <div class="product-card">
        <div class="thumb">
          <span class="badge">校内</span>
        </div>
        <div class="info">
          <div class="title">校园文创明信片套装</div>
          <div class="meta">5月15日 · 文创周边</div>
          <div class="price-row">
            <span class="price">¥18</span>
            <span class="sales">已售 156</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TabBar -->
  <div class="tab-bar">
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>圈子</span>
    </div>
    <div class="tab-item active">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>发现</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <span>消息</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>
</div>

</body>
</html>
