<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>个人中心 — 校园恋爱小程序</title>
<style>
:root {
  --brand: #3FCF8E;
  --brand-dark: #2DB97A;
  --brand-light: #D1F0E0;
  --brand-50: #E8F8F0;
  --gray-0: #FFFFFF;
  --gray-50: #F4F6FA;
  --gray-100: #EEF0F4;
  --gray-200: #E2E8F0;
  --gray-400: #94A3B8;
  --gray-500: #64748B;
  --gray-700: #334155;
  --gray-800: #1F2329;
  --text-primary: #1F2329;
  --text-secondary: #5B6470;
  --text-tertiary: #9AA1AB;
  --vip-from: #C9A36A;
  --vip-to: #E8C98A;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--gray-50);
  width: 375px;
  min-height: 100vh;
  margin: 0 auto;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.phone-frame {
  width: 375px;
  min-height: 812px;
  position: relative;
  background: var(--gray-50);
}
.status-bar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--gray-0);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}
.status-bar .icons { display: flex; gap: 4px; align-items: center; }
.status-bar .icons svg { width: 16px; height: 16px; stroke: var(--text-primary); fill: none; stroke-width: 1.5; }

/* 导航栏 */
.nav-bar {
  height: 48px;
  background: var(--gray-0);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--gray-100);
}
.nav-bar .left .back-btn {
  width: 32px;
  height: 32px;
  background: none;
  border: none;
  cursor: pointer;
}
.nav-bar .left .back-btn svg { width: 24px; height: 24px; stroke: var(--text-primary); fill: none; stroke-width: 1.5; }
.nav-bar .title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
}
.nav-bar .right { display: flex; gap: 12px; }
.nav-bar .right .icon-btn {
  width: 36px;
  height: 36px;
  background: none;
  border: none;
  cursor: pointer;
}
.nav-bar .right .icon-btn svg { width: 24px; height: 24px; stroke: var(--text-secondary); fill: none; stroke-width: 1.5; }

/* 用户信息 */
.user-section {
  padding: 24px 16px;
  background: var(--gray-0);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
.user-info .avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 28px;
  font-weight: 600;
}
.user-info .info {
  flex: 1;
}
.user-info .info .name {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.user-info .info .school {
  font-size: 13px;
  color: var(--text-tertiary);
}

/* VIP 横幅 */
.vip-banner {
  background: linear-gradient(12deg, var(--vip-from) 0%, var(--vip-to) 100%);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.vip-banner .info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.vip-banner .info .label {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}
.vip-banner .info .expire {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
}
.vip-banner .btn-renew {
  padding: 8px 16px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}

/* 宫格菜单 */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 16px;
  background: var(--gray-0);
  margin-top: 12px;
}
.menu-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 12px 0;
  background: var(--gray-50);
  border-radius: 12px;
  cursor: pointer;
}
.menu-item .icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-item .icon svg { width: 24px; height: 24px; stroke: var(--brand); fill: none; stroke-width: 1.5; }
.menu-item .label {
  font-size: 12px;
  color: var(--text-secondary);
}

/* 推荐区域 */
.recommend-section {
  margin: 12px 16px;
  background: var(--gray-0);
  border-radius: 16px;
  padding: 16px;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.section-header h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}
.section-header .more {
  font-size: 14px;
  color: var(--text-tertiary);
}

/* 人物卡片 */
.people-cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.people-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--gray-50);
  border-radius: 12px;
}
.people-card .avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-light) 0%, var(--brand) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  flex-shrink: 0;
}
.people-card .info {
  flex: 1;
}
.people-card .info .name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}
.people-card .info .school {
  font-size: 12px;
  color: var(--text-tertiary);
}
.people-card .btn-greet {
  padding: 8px 16px;
  background: transparent;
  color: var(--brand);
  border: 1px solid var(--brand);
  border-radius: 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}

/* TabBar */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 375px;
  height: 49px;
  background: var(--gray-0);
  border-top: 1px solid var(--gray-100);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
}
.tab-item svg {
  width: 24px;
  height: 24px;
  stroke: var(--text-tertiary);
  fill: none;
  stroke-width: 1.5;
}
.tab-item span {
  font-size: 10px;
  color: var(--text-tertiary);
}
.tab-item.active svg {
  stroke: var(--brand);
  fill: var(--brand);
}
.tab-item.active span {
  color: var(--brand);
  font-weight: 500;
}
</style>
</head>
<body>

<div class="phone-frame">
  <!-- 状态栏 -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>

      </div>

    </div>
  </div>

  <!-- 推荐区域 -->
  <div class="recommend-section">
    <div class="section-header">
      <h3>为你推荐</h3>
      <span class="more">更多 ></span>
    </div>
    <div class="people-cards">
